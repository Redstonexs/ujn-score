name: Build Frontend and Release Package

on:
  push:
    branches:
      - main  # 更改为推送到 main 分支时自动触发
  workflow_dispatch:
    # 移除了必填的 inputs.tag，统一使用自动生成的版本号

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  PACKAGE_PREFIX: "ujn-score"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须拉取完整的提交历史和 Tags，否则无法获取上一个版本号

      - name: Generate new release tag
        id: release_tag
        run: |
          # 检查是否存在历史 tag
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            # 获取最新的 tag (例如 "1.0.0" 或 "v1.0.0")
            LATEST_TAG=$(git describe --tags --abbrev=0)
            echo "Latest tag found: $LATEST_TAG"
            
            # 去除可能包含的 'v' 前缀进行计算
            VERSION=${LATEST_TAG#v}
            
            # 按照 '.' 分割主版本、次版本和修订号
            IFS='.' read -r major minor patch <<< "$VERSION"
            
            # 容错：如果某些部分为空，则补 0
            major=${major:-1}
            minor=${minor:-0}
            patch=${patch:-0}
            
            # 修订号加 1 (例如 1.0.0 -> 1.0.1)
            patch=$((patch + 1))
            NEW_TAG="${major}.${minor}.${patch}"
          else
            # 如果没有任何历史 tag，则从 1.0.0 开始
            echo "No previous tags found."
            NEW_TAG="1.0.0"
          fi
          
          echo "New tag generated: $NEW_TAG"
          # 将新生成的版本号写入 GitHub Output 供后续步骤使用
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package release files
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          PACKAGE_PREFIX: ${{ env.PACKAGE_PREFIX }}
        run: |
          PACKAGE_ROOT="release-package"
          PACKAGE_NAME="${PACKAGE_PREFIX}-${RELEASE_TAG}"

          rm -rf "$PACKAGE_ROOT" "${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}.zip"
          mkdir -p "$PACKAGE_ROOT/$PACKAGE_NAME/frontend" "$PACKAGE_ROOT/$PACKAGE_NAME/ujn"

          if [[ ! -d frontend/dist ]] || [[ -z "$(ls -A frontend/dist)" ]]; then
            echo "Error: frontend/dist directory is missing or empty after build step. Check frontend build logs for errors."
            exit 1
          fi

          cp -r frontend/dist "$PACKAGE_ROOT/$PACKAGE_NAME/frontend/dist"
          rsync -a \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='.pytest_cache/' \
            ujn/ "$PACKAGE_ROOT/$PACKAGE_NAME/ujn/"
          for file in README.md LICENSE .env.example; do
            if [[ -f "$file" ]]; then
              cp "$file" "$PACKAGE_ROOT/$PACKAGE_NAME/"
            fi
          done

          tar -C "$PACKAGE_ROOT" -czf "${PACKAGE_NAME}.tar.gz" "$PACKAGE_NAME"
          (cd "$PACKAGE_ROOT" && zip -r "../${PACKAGE_NAME}.zip" "$PACKAGE_NAME")

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          # 开启自动生成 Release 描述的功能，列出 PR 和 Commit 记录
          generate_release_notes: true 
          files: |
            ujn-score-${{ steps.release_tag.outputs.tag }}.tar.gz
            ujn-score-${{ steps.release_tag.outputs.tag }}.zip
