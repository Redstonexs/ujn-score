[uwsgi]
# Django project deployment config for the current /ujn layout

# Project root (the directory that contains manage.py and scoring_system/)
chdir = /ujn

# Django WSGI entrypoint
module = scoring_system.wsgi:application
env = DJANGO_SETTINGS_MODULE=scoring_system.settings

# Python virtual environment
home = /root/miniconda3/envs/web

# Expose plain HTTP locally; 1Panel reverse proxy should point to http://127.0.0.1:8000
http-socket = 127.0.0.1:8000

# Process model
master = true
processes = 2
threads = 2
enable-threads = true

# Stability
vacuum = true
die-on-term = true
need-app = true
harakiri = 60
max-requests = 1000
buffer-size = 65535
listen = 128

# Serve collected static files and uploaded media from uWSGI
static-map = /static=/ujn/staticfiles
static-map = /media=/ujn/media

# Logging
logto = /ujn/uwsgi.log
